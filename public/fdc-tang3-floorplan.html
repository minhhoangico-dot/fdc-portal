<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDC Phòng Khám - Sơ Đồ Tầng 3</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --wall: #2c2c2c;
    --room-fill: #ffffff;
    --accent: #1a6b4e;
    --text: #2c2c2c;
    --text-muted: #6b6b6b;
    --medical: #e8f5ee;
    --utility: #f5f5f5;
    --office: #fdf6e8;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease-out;
  }

  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .header p {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 300;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
    animation: fadeDown 0.6s ease-out 0.1s both;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.1);
  }

  .floor-container {
    background: white;
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 32px;
    max-width: 420px;
    width: 100%;
    animation: fadeUp 0.7s ease-out 0.2s both;
    position: relative;
    overflow: hidden;
  }

  .floor-container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), #2a9d6e);
  }

  .floorplan {
    width: 100%;
    aspect-ratio: 0.5;
    position: relative;
    border: 2.5px solid var(--wall);
    border-radius: 4px;
    background: var(--room-fill);
  }

  .room {
    position: absolute;
    border: 1.5px solid #bbb;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4px;
    transition: all 0.25s ease;
    cursor: default;
    border-radius: 2px;
  }

  .room:hover {
    transform: scale(1.03);
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    border-color: var(--accent);
  }

  .room-name {
    font-size: 0.68rem;
    font-weight: 600;
    line-height: 1.2;
    color: var(--text);
  }

  .room-id {
    font-size: 0.58rem;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .room-icon {
    font-size: 1.1rem;
    margin-bottom: 2px;
  }

  .cat-medical { background: var(--medical); }
  .cat-utility { background: var(--utility); }
  .cat-office { background: var(--office); }

  .corridor {
    position: absolute;
    background: repeating-linear-gradient(
      90deg,
      #f9f9f9 0px,
      #f9f9f9 8px,
      #f0f0f0 8px,
      #f0f0f0 10px
    );
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  .stairs {
    position: absolute;
    background: repeating-linear-gradient(
      0deg,
      #e8e8e8 0px,
      #e8e8e8 4px,
      #d0d0d0 4px,
      #d0d0d0 5px
    );
    border: 1.5px solid #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: 2px;
    text-align: center;
  }

  .floor-label {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: white;
    padding: 4px 16px;
    border-radius: 12px 12px 0 0;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .floor-label::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 6px solid var(--accent);
  }

  .room[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--wall);
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 400;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }

  .footer-note {
    text-align: center;
    margin-top: 16px;
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 300;
    animation: fadeUp 0.7s ease-out 0.4s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 500px) {
    .floor-container { padding: 16px; }
    .room-name { font-size: 0.55rem; }
    .room-id { font-size: 0.48rem; }
    .room-icon { font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏥 FDC Phòng Khám Gia Đình</h1>
  <p>Sơ đồ mặt bằng Tầng 3</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--office)"></div>Phòng họp</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--medical)"></div>Phòng khám</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--utility)"></div>Phụ trợ</div>
</div>

<div class="floor-container">
  <div class="floorplan">

    <div class="floor-label">TẦNG 3</div>

    <!-- Hành lang bên trái -->
    <div class="corridor" style="left:1%; top:1%; width:25%; height:98%; border-right: 1px dashed #ccc;">
      <span style="writing-mode: vertical-rl; transform: rotate(180deg); opacity: 0.5;">HÀNH LANG</span>
    </div>

    <!-- ============ ROOMS (right side) ============ -->

    <!-- Phòng họp (150% height so với các phòng khác) -->
    <div class="room cat-office" style="left:27%; top:1%; width:72%; height:18%;" data-tip="Phòng họp">
      <div class="room-icon">📋</div>
      <div class="room-name">Phòng Họp</div>
    </div>

    <!-- P304 -->
    <div class="room cat-medical" style="left:27%; top:20%; width:72%; height:12%;" data-tip="Phòng khám P304">
      <div class="room-icon">🩺</div>
      <div class="room-name">Phòng Khám</div>
      <div class="room-id">P304</div>
    </div>

    <!-- P303 -->
    <div class="room cat-medical" style="left:27%; top:33%; width:72%; height:12%;" data-tip="Phòng khám P303">
      <div class="room-icon">🩺</div>
      <div class="room-name">Phòng Khám</div>
      <div class="room-id">P303</div>
    </div>

    <!-- P302 -->
    <div class="room cat-medical" style="left:27%; top:46%; width:72%; height:12%;" data-tip="Phòng khám P302">
      <div class="room-icon">🩺</div>
      <div class="room-name">Phòng Khám</div>
      <div class="room-id">P302</div>
    </div>

    <!-- P301 -->
    <div class="room cat-medical" style="left:27%; top:59%; width:72%; height:12%;" data-tip="Phòng khám P301">
      <div class="room-icon">🩺</div>
      <div class="room-name">Phòng Khám</div>
      <div class="room-id">P301</div>
    </div>

    <!-- Kho T3 -->
    <div class="room cat-utility" style="left:27%; top:72%; width:72%; height:10%;" data-tip="Kho Tầng 3">
      <div class="room-icon">📦</div>
      <div class="room-name">Kho T3</div>
    </div>

    <!-- Cầu thang từ T2 -->
    <div class="stairs" style="left:27%; top:83%; width:72%; height:16%;" data-tip="Cầu thang từ Tầng 2">
      🪜 Cầu Thang từ T2
    </div>

  </div>
</div>

<div class="footer-note">
  Hover vào phòng để xem chi tiết · FDC Phòng Khám Gia Đình · Tầng 3
</div>

</body>
</html>
